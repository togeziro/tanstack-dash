version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      tanstack:
        patterns: ['@tanstack/*']
      radix:
        patterns: ['@radix-ui/*']
      fontsource:
        patterns: ['@fontsource*']
      dnd-kit:
        patterns: ['@dnd-kit/*']
      testing:
        patterns: ['@testing-library/*']
